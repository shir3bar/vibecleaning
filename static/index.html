<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vibecleaning</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-0: #070b11;
    --bg-1: #0b1320;
    --panel: rgba(11, 19, 30, 0.84);
    --panel-2: rgba(16, 26, 40, 0.9);
    --line: rgba(148, 163, 184, 0.18);
    --line-strong: rgba(148, 163, 184, 0.3);
    --text: #e5ecf3;
    --muted: #91a2b7;
    --danger: #ff9b9b;
  }
  html, body {
    min-height: 100%;
  }
  body {
    background:
      radial-gradient(circle at top left, rgba(116, 212, 255, 0.08), transparent 28%),
      radial-gradient(circle at bottom right, rgba(103, 232, 249, 0.06), transparent 22%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 18px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(6, 10, 16, 0.88);
    backdrop-filter: blur(14px);
    position: sticky;
    top: 0;
    z-index: 10;
    flex-wrap: wrap;
  }
  .brand h1 {
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.01em;
    text-transform: lowercase;
  }
  .header-controls {
    flex: 1 1 760px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: flex-end;
  }
  .field {
    min-width: 210px;
    display: grid;
    gap: 6px;
  }
  .field label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  select {
    min-height: 40px;
    width: 100%;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font: inherit;
  }
  select:focus {
    outline: none;
    border-color: var(--line-strong);
  }
  .main {
    flex: 1;
    width: min(1440px, 100%);
    margin: 0 auto;
    padding: 26px 18px 32px;
  }
  .message {
    max-width: 720px;
    padding: 18px 20px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    line-height: 1.6;
  }
  .message strong {
    color: var(--text);
  }
  .message.error {
    color: var(--danger);
  }
  .message code {
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }
  .stack {
    display: grid;
    gap: 18px;
  }
  .readme-panel {
    max-width: 960px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--panel);
    overflow: hidden;
  }
  .readme-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .readme-body {
    max-height: calc(100vh - 190px);
    overflow: auto;
    padding: 18px 20px 22px;
  }
  .readme-body pre {
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    line-height: 1.6;
    font-size: 13px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }
  @media (max-width: 900px) {
    .header-controls {
      justify-content: stretch;
      flex-basis: 100%;
    }
    .field {
      min-width: 100%;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <h1>vibecleaning</h1>
    </div>
    <div id="header-controls" class="header-controls"></div>
  </header>
  <main class="main">
    <div id="app"></div>
  </main>
</div>
<script src="/static/app.js"></script>
</body>
</html>
