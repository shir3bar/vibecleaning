<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vibecleaning</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤙</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --panel: rgba(8, 17, 27, 0.88);
    --border: rgba(148, 163, 184, 0.16);
    --text: #e8eef7;
    --muted: #92a4bd;
  }
  html, body {
    height: 100%;
  }
  body {
    background:
      radial-gradient(circle at top left, rgba(116, 212, 255, 0.12), transparent 28%),
      radial-gradient(circle at bottom right, rgba(63, 98, 181, 0.18), transparent 26%),
      linear-gradient(180deg, #09111a 0%, #050911 100%);
    color: var(--text);
    font-family: "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #app-shell {
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    backdrop-filter: blur(18px);
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .brand h1 {
    font-size: 18px;
    font-weight: 700;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    /* color: #7dff98; */
    letter-spacing: 0.03em;
    text-shadow: 0 0 12px rgba(125, 255, 152, 0.28);
    text-transform: lowercase;
  }
  .brand span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #app {
    flex: 1;
    min-height: 0;
  }
</style>
</head>
<body>
<div id="app-shell">
  <header class="topbar">
    <div class="brand">
      <h1>vibecleaning</h1>
      <span>movement outlier review example</span>
    </div>
  </header>
  <main id="app"></main>
</div>
<script type="module" src="/static/app.js"></script>
</body>
</html>
